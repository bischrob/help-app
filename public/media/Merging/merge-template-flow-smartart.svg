<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280" role="img" aria-labelledby="title desc">
  <title id="title">Merge Template Core Structure</title>
  <desc id="desc">Smart-art style flow showing MERGING to STACK to DATASET to USES to CATEGORY, with branches from STACK and DATASET to VARIABLE.</desc>

  <defs>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecf3ff" />
      <stop offset="100%" stop-color="#dbe7ff" />
    </linearGradient>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,2 L0,4 z" fill="#4f6fb5" />
    </marker>
    <style>
      .box { fill: url(#boxFill); stroke: #4f6fb5; stroke-width: 2.5; rx: 12; ry: 12; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #22365f; letter-spacing: 0.5px; }
      .flow { fill: none; stroke: #4f6fb5; stroke-width: 4; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="box" x="30" y="40" width="160" height="72" />
  <text class="label" x="110" y="86" text-anchor="middle">MERGING</text>

  <rect class="box" x="220" y="40" width="130" height="72" />
  <text class="label" x="285" y="86" text-anchor="middle">STACK</text>

  <rect class="box" x="380" y="40" width="160" height="72" />
  <text class="label" x="460" y="86" text-anchor="middle">DATASET</text>

  <rect class="box" x="570" y="40" width="130" height="72" />
  <text class="label" x="635" y="86" text-anchor="middle">USES</text>

  <rect class="box" x="730" y="40" width="190" height="72" />
  <text class="label" x="825" y="86" text-anchor="middle">CATEGORY</text>

  <rect class="box" x="405" y="170" width="170" height="72" />
  <text class="label" x="490" y="216" text-anchor="middle">VARIABLE</text>

  <path class="flow" d="M190 76 H218" />
  <path class="flow" d="M350 76 H378" />
  <path class="flow" d="M540 76 H568" />
  <path class="flow" d="M700 76 H728" />

  <path class="flow" d="M285 114 V204 H403" />
  <path class="flow" d="M460 114 V150 H490 V168" />
</svg>
